/**
 * Top-level build file for ftc_app project.
 *
 * It is extraordinarily rare that you will ever need to edit this file.
 */

buildscript {
    repositories {
        mavenCentral()
        google()
    }
    dependencies {
        // Note for FTC Teams: Do not modify this yourself.
        classpath 'com.android.tools.build:gradle:8.7.0'
    }
}

// This is now required because aapt2 has to be downloaded from the
// google() repository beginning with version 3.2 of the Android Gradle Plugin
allprojects {
    repositories {
        mavenCentral()
        google()
    }
}

repositories {
    mavenCentral()
}

tasks.register('launchDanceBot', Exec) {
    group = 'ftc'
    description = 'Launches DanceBot Auto over Robocol UDP. Connect to Control Hub Wi-Fi first.'
    workingDir rootDir
    commandLine './launch-dancebot'
}

tasks.register('launchDanceBotMotorTest', Exec) {
    group = 'ftc'
    description = 'Launches the one-motor-at-a-time DanceBot diagnostic. Connect to Control Hub Wi-Fi first.'
    workingDir rootDir
    commandLine './launch-dancebot', 'motor-test'
}

tasks.register('listDanceBotOpModes', Exec) {
    group = 'ftc'
    description = 'Lists OpModes reported by the Robot Controller. Connect to Control Hub Wi-Fi first.'
    workingDir rootDir
    commandLine './launch-dancebot', 'list'
}
